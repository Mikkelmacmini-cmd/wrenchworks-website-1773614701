name: Lighthouse CI

on:
  workflow_dispatch:
  pull_request:
    types: [labeled]

permissions:
  contents: read
  pull-requests: write

jobs:
  run-lighthouse:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install lighthouse-ci
        run: npm ci

      - name: Run Lighthouse against preview URL
        env:
          PREVIEW_URL: ${{ secrets.PREVIEW_URL }}
        run: |
          if [ -z "$PREVIEW_URL" ]; then
            echo "No PREVIEW_URL secret provided. Skipping Lighthouse run.";
            exit 0;
          fi
          npx @lhci/cli autorun --url="$PREVIEW_URL" || true

      - name: Check thresholds and fail if below target
        run: |
          # Example: use lhci results or lighthousereport to determine pass/fail
          # Placeholder: exit 0 to avoid accidental breakage
          echo "Thresholds check not implemented; configure lhci settings in .lighthouseci.json"

<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
body{margin:0;background:#fff;font-family:Inter,Arial}
.wrap{width:1200px;margin:20px auto;padding:20px}
.hero{position:relative;width:100%;height:520px;overflow:hidden}
.hero img{width:100%;height:100%;object-fit:cover}
.badge{position:absolute;background:rgba(0,0,0,0.6);color:#fff;padding:8px 12px;border-radius:999px;font-weight:700}
.badge.one{left:20px;top:20px}
.row{display:flex;gap:10px;margin-top:12px}
.card{position:relative;flex:1;height:220px;overflow:hidden}
.card img{width:100%;height:100%;object-fit:cover}
.card .badge{top:10px;left:10px}
.label{margin-top:10px;font-weight:600}
</style>
</head>
<body>
<div class="wrap">
  <div class="label">Performance Signal — Mood Board (numbered)</div>
  <div class="hero"><img src="../hero/hero-03-performance-bay.webp"/><div class="badge one">1</div></div>
  <div class="row">
    <div class="card"><img src="../service/service-01-vehicle-diagnostics.webp"/><div class="badge">2</div></div>
    <div class="card"><img src="../service/service-04-suspension-steering.webp"/><div class="badge">3</div></div>
    <div class="card"><img src="../service/service-06-fleet-service.webp"/><div class="badge">4</div></div>
  </div>
</div>
</body>
</html>

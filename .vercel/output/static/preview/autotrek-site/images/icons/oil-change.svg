<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 80" fill="none">
  <!-- Oil can body (main rectangle) -->
  <rect x="8" y="32" width="52" height="34" rx="3" stroke="#c0392b" stroke-width="5" fill="none"/>
  <!-- Top of can (narrower top) -->
  <rect x="20" y="20" width="28" height="14" rx="2" stroke="#c0392b" stroke-width="5" fill="none"/>
  <!-- Spout arm extending right -->
  <path d="M60 38 L78 28 L84 28" stroke="#c0392b" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Spout tip (small rectangle) -->
  <rect x="82" y="22" width="8" height="12" rx="2" stroke="#c0392b" stroke-width="4" fill="none"/>
  <!-- Oil drop falling from spout -->
  <path d="M86 36 Q83 42 86 46 Q89 42 86 36Z" fill="#c0392b"/>
  <!-- Handle on left -->
  <path d="M8 42 Q-2 42 -2 52 Q-2 62 8 62" stroke="#c0392b" stroke-width="5" stroke-linecap="round" fill="none"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300">
  <rect width="100%" height="100%" fill="#f6f8fa" />
  <!-- Header area -->
  <rect x="24" y="24" width="1152" height="64" rx="8" fill="#ffffff" stroke="#e1e4e8" />
  <!-- Logo (left) -->
  <g transform="translate(48,36)">
    <rect width="48" height="48" rx="8" fill="#0b6cff" />
    <text x="24" y="32" font-family="Arial" font-size="20" fill="#ffffff" text-anchor="middle">W</text>
  </g>
  <!-- Nav (right) -->
  <g transform="translate(900,40)" font-family="Arial, sans-serif" font-size="16" fill="#333">
    <text x="0" y="0">Pricing</text>
    <text x="90" y="0">Docs</text>
    <text x="170" y="0">Contact</text>
  </g>
  <!-- Hero card overlapping header (center) -->
  <g transform="translate(150,120)">
    <rect width="900" height="140" rx="12" fill="#ffffff" stroke="#e6eefb" />
    <text x="40" y="48" font-family="Helvetica" font-size="28" fill="#0b2b4a">Mock 1 — Left logo, centered hero overlap</text>
    <rect x="40" y="72" width="320" height="40" rx="6" fill="#0b6cff" />
    <text x="200" y="98" font-family="Arial" font-size="16" fill="#fff" text-anchor="middle">Get Started</text>
  </g>
  <!-- Labels -->
  <text x="48" y="280" font-family="Arial" font-size="12" fill="#666">Desktop — Option 1</text>
</svg>